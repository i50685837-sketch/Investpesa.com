<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | InvestPesa.com</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:
linear-gradient(rgba(6,15,35,.75),rgba(6,15,35,.80)),
url("https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
}

.register-box{
width:420px;
padding:40px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 20px 50px rgba(0,0,0,.4);
}

h1{
text-align:center;
color:#00ff88;
margin-bottom:8px;
}

h1 span{
color:#fff;
}

p{
text-align:center;
color:#ddd;
margin-bottom:25px;
}

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.12);
color:#fff;
font-size:15px;
}

.input-box input::placeholder{
color:#ddd;
}

.terms{
display:flex;
align-items:center;
gap:10px;
color:#fff;
font-size:14px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:50px;
background:#00ff88;
color:#000;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 0 20px #00ff88;
}

.login{
margin-top:20px;
text-align:center;
color:#fff;
}

.login a{
color:#00ff88;
text-decoration:none;
font-weight:600;
}

.login a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="register-box">

<h1>Invest<span>Pesa</span>.com</h1>

<p>Create your investment account</p>

<form action="dashboard.html">

<div class="input-box">
<input type="text" placeholder="👤 Full Name" required>
</div>

<div class="input-box">
<input type="email" placeholder="📧 Email Address" required>
</div>

<div class="input-box">
<input type="tel" placeholder="📱 Phone Number" required>
</div>

<div class="input-box">
<input type="password" placeholder="🔒 Password" required>
</div>

<div class="input-box">
<input type="password" placeholder="🔒 Confirm Password" required>
</div>

<label class="terms">
<input type="checkbox" required>
I agree to the Terms & Conditions
</label>

<button type="submit">
Create Account
</button>

</form>

<div class="login">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

</body>
  </html>
