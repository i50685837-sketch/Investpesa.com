<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Investpesa.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

    body {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899, #f59e0b);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .register-box {
      background: white;
      width: 100%;
      max-width: 450px;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(90deg, #3b82f6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    h2 {
      color: #1e293b;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .form-group label {
      font-weight: 600;
      color: #334155;
      display: block;
      margin-bottom: 6px;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      transition: 0.3s;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: #3b82f6;
      outline: none;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #ef4444, #f97316, #eab308);
      background-size: 200% 200%;
      transition: 0.4s;
    }
    .btn:hover {
      background-position: right center;
      transform: translateY(-2px);
    }

    .login-link {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #475569;
    }
    .login-link a {
      color: #3b82f6;
      font-weight: 600;
      text-decoration: none;
    }
    .login-link a:hover { text-decoration: underline; }

    .row {
      display: flex;
      gap: 12px;
    }
    .row .form-group { flex: 1; }

  </style>
</head>
<body>

  <div class="register-box">
    <div class="logo">Invest<span style="color:#ec4899">pesa</span>.com</div>
    <h2>Create Your Account 🎉</h2>

    <form>
      <div class="row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="Enter First Name" required>
        </div>
        <div class="form-group">
          <label>Surname</label>
          <input type="text" placeholder="Enter Surname" required>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter Email Address" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter Phone Number" required>
      </div>

      <div class="form-group">
        <label>Country</label>
        <select required>
          <option value="">Select Country</option>
          <option>Kenya</option>
          <option>Uganda</option>
          <option>Tanzania</option>
          <option>Other</option>
        </select>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter Password" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm Password" required>
        </div>
      </div>

      <button type="submit" class="btn">Register Now</button>

      <p class="login-link">
        Already have an account? <a href="index.html">Login here</a>
      </p>
    </form>
  </div>

</body>
          </html>
